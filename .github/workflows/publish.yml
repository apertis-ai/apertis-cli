name: Publish to npm

# Publishes when a version tag (e.g. v0.1.1) is pushed:
#   npm version patch && git push --follow-tags
#
# Uses npm OIDC trusted publishing — no NPM_TOKEN secret. One-time setup:
# npmjs.com → @apertis/cli → Settings → Trusted Publisher → GitHub Actions,
# repo apertis-ai/apertis-cli, workflow publish.yml.

on:
  push:
    tags: ["v*"]

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for OIDC trusted publishing
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: "https://registry.npmjs.org"
      - run: npm ci
      - name: Type check
        run: npm run typecheck
      - name: Test
        run: npm test
      - name: Build
        run: npm run build
      - name: Upgrade npm for OIDC trusted publishing
        run: npm install -g npm@latest
      - name: Publish
        run: npm publish --access public
